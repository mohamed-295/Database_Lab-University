<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My CV Project</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      font-size: 13px;
      margin: 20px;
    }

    h2 {
      font-weight: bold;
      margin-bottom: 20px;
    }

    table {
      border-collapse: collapse;
    }

    td {
      padding: 3px 6px;
      vertical-align: middle;
    }

    td.label {
      text-align: right;
      white-space: nowrap;
    }

    input[type="text"] {
      width: 240px;
      height: 18px;
      border: 1px solid #999;
      padding: 1px 3px;
      font-size: 12px;
      box-sizing: border-box;
    }

    input.short {
      width: 200px;
    }

    select {
      font-size: 12px;
    }

    input[type="submit"] {
      margin-top: 8px;
      padding: 2px 14px;
      font-size: 13px;
    }

    button[type="button"] {
      margin-top: 8px;
      margin-right: 8px;
      padding: 2px 14px;
      font-size: 13px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h2>MY CV PROJECT</h2>

  <form action="/submit" method="post" id="cvForm">
    <table>

      <tr>
        <td class="label">First Name:</td>
        <td><input type="text" name="fName" /></td>
      </tr>
      <tr>
        <td class="label">Last Name:</td>
        <td><input type="text" name="lName" /></td>
      </tr>
      <tr>
        <td class="label">address:</td>
        <td><input type="text" name="address" /></td>
      </tr>
      <tr>
        <td class="label">country:</td>
        <td>
          <select name="country">
            <option value="Egypt" selected>Egypt</option>
            <option value="UK">UK</option>
            <option value="USA">USA</option>
            <option value="France">France</option>
            <option value="Germany">Germany</option>
            <option value="Saudi Arabia">Saudi Arabia</option>
            <option value="UAE">UAE</option>
            <option value="Other">Other</option>
          </select>
        </td>
      </tr>
      <tr>
        <td class="label">city:</td>
        <td><input type="text" name="city" /></td>
      </tr>
      <tr>
        <td class="label">email:</td>
        <td><input type="text" name="email" /></td>
      </tr>

      <tr>
        <td class="label">Latest 3 projects:</td>
        <td><input type="text" class="short" name="project1" /></td>
        <td><input type="text" class="short" name="project2" /></td>
        <td><input type="text" class="short" name="project3" /></td>
      </tr>
      <tr>
        <td class="label">Latest 3 courses:</td>
        <td><input type="text" class="short" name="course1" /></td>
        <td><input type="text" class="short" name="course2" /></td>
        <td><input type="text" class="short" name="course3" /></td>
      </tr>
      <tr>
        <td class="label">Languages:</td>
        <td><input type="text" class="short" name="lang1" /></td>
        <td><input type="text" class="short" name="lang2" /></td>
        <td><input type="text" class="short" name="lang3" /></td>
      </tr>
      <tr>
        <td class="label">Hobbies:</td>
        <td><input type="text" class="short" name="hobby1" /></td>
        <td><input type="text" class="short" name="hobby2" /></td>
        <td><input type="text" class="short" name="hobby3" /></td>
      </tr>
      <tr>
        <td class="label">Training:</td>
        <td><input type="text" class="short" name="training1" /></td>
        <td><input type="text" class="short" name="training2" /></td>
        <td><input type="text" class="short" name="training3" /></td>
      </tr>

      <tr>
        <td></td>
        <td colspan="3" style="text-align: center;">
          <button type="button" id="fillDummyBtn">Fill Dummy Data</button>
          <button type="button" id="clearFieldsBtn">Clear Fields</button>
          <input type="submit" value="Submit" />
        </td>
      </tr>

    </table>
  </form>

  <script>
    const form = document.getElementById('cvForm');

    const dataPool = {
      firstNames: ['Amina', 'Omar', 'Laila', 'Youssef', 'Nour', 'Kareem', 'Salma', 'Hassan', 'Mona', 'Ramy'],
      lastNames: ['Hassan', 'Khaled', 'Samir', 'Maged', 'Adel', 'Nabil', 'Mahmoud', 'Saleh', 'Fathy', 'Saeed'],
      streets: ['Nile St', 'King Rd', 'Market Ave', 'Green Way', 'Palm St', 'River Rd', 'Garden St', 'Sunset Ave'],
      locations: [
        { country: 'Egypt', cities: ['Cairo', 'Giza', 'Alexandria'] },
        { country: 'UK', cities: ['London', 'Leeds', 'Manchester'] },
        { country: 'USA', cities: ['New York', 'Chicago', 'Boston'] },
        { country: 'France', cities: ['Paris', 'Lyon', 'Nice'] },
        { country: 'Germany', cities: ['Berlin', 'Munich', 'Hamburg'] },
        { country: 'Saudi Arabia', cities: ['Riyadh', 'Jeddah', 'Dammam'] },
        { country: 'UAE', cities: ['Dubai', 'Abu Dhabi', 'Sharjah'] }
      ],
      projects: ['CRM Dashboard', 'Booking API', 'Mobile Shop App', 'Admin Panel', 'E-learning App', 'Analytics Tool', 'Inventory System', 'Helpdesk Portal'],
      courses: ['Databases', 'Node.js', 'Cloud Basics', 'System Design', 'DevOps', 'Testing', 'Cyber Security', 'Data Structures'],
      languages: ['Arabic', 'English', 'French', 'German', 'Spanish', 'Italian', 'Turkish'],
      hobbies: ['Reading', 'Chess', 'Photography', 'Gaming', 'Cycling', 'Swimming', 'Traveling', 'Cooking'],
      trainings: ['AWS Practitioner', 'Scrum Fundamentals', 'Docker Bootcamp', 'Postman Advanced', 'CI/CD Pipeline', 'Linux Admin', 'Team Communication']
    };

    function pickOne(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function pickThreeDistinct(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return [copy[0], copy[1], copy[2]];
    }

    function setValue(name, value) {
      const field = document.querySelector(`[name="${name}"]`);
      if (field) {
        field.value = value;
      }
    }

    function fillDummyData() {
      const firstName = pickOne(dataPool.firstNames);
      const lastName = pickOne(dataPool.lastNames);
      const location = pickOne(dataPool.locations);
      const city = pickOne(location.cities);
      const streetNo = Math.floor(Math.random() * 140) + 1;
      const address = `${streetNo} ${pickOne(dataPool.streets)}`;
      const uniquePart = `${Date.now()}${Math.floor(Math.random() * 1000)}`;
      const email = `${firstName}.${lastName}.${uniquePart}@mail.com`.toLowerCase();

      const [project1, project2, project3] = pickThreeDistinct(dataPool.projects);
      const [course1, course2, course3] = pickThreeDistinct(dataPool.courses);
      const [lang1, lang2, lang3] = pickThreeDistinct(dataPool.languages);
      const [hobby1, hobby2, hobby3] = pickThreeDistinct(dataPool.hobbies);
      const [training1, training2, training3] = pickThreeDistinct(dataPool.trainings);

      setValue('fName', firstName);
      setValue('lName', lastName);
      setValue('address', address);
      setValue('country', location.country);
      setValue('city', city);
      setValue('email', email);

      setValue('project1', project1);
      setValue('project2', project2);
      setValue('project3', project3);

      setValue('course1', course1);
      setValue('course2', course2);
      setValue('course3', course3);

      setValue('lang1', lang1);
      setValue('lang2', lang2);
      setValue('lang3', lang3);

      setValue('hobby1', hobby1);
      setValue('hobby2', hobby2);
      setValue('hobby3', hobby3);

      setValue('training1', training1);
      setValue('training2', training2);
      setValue('training3', training3);
    }

    function clearFields() {
      form.reset();
    }

    document.getElementById('fillDummyBtn').addEventListener('click', fillDummyData);
    document.getElementById('clearFieldsBtn').addEventListener('click', clearFields);
  </script>

</body>
</html>
